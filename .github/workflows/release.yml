name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify release candidate
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Require successful push check workflow for release commit
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REQUIRED_WORKFLOW_NAME: check
        shell: bash
        run: |
          set -euo pipefail
          export RELEASE_SHA="$(git rev-parse HEAD)"
          python3 - <<'PY'
          import json
          import os
          import time
          import urllib.parse
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          sha = os.environ["RELEASE_SHA"]
          workflow_name = os.environ["REQUIRED_WORKFLOW_NAME"]
          deadline = time.time() + 600

          def fetch_runs():
              query = urllib.parse.urlencode({"event": "push", "head_sha": sha, "per_page": 100})
              url = f"https://api.github.com/repos/{repo}/actions/runs?{query}"
              request = urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request) as response:
                  return json.load(response)

          last_status = None
          while True:
              runs = [
                  run for run in fetch_runs().get("workflow_runs", [])
                  if run.get("name") == workflow_name and run.get("head_sha") == sha
              ]
              runs.sort(key=lambda run: run.get("created_at", ""), reverse=True)

              if runs:
                  run = runs[0]
                  status = run.get("status")
                  conclusion = run.get("conclusion")
                  html_url = run.get("html_url")
                  last_status = f"{workflow_name} run {run.get('id')} status={status} conclusion={conclusion} url={html_url}"
                  print(last_status)
                  if status == "completed":
                      if conclusion != "success":
                          raise SystemExit(
                              f"Release blocked: required push workflow '{workflow_name}' for {sha} concluded {conclusion}.\n{html_url}"
                          )
                      print(f"Release gate confirmed green push workflow '{workflow_name}' for {sha}.")
                      break
              else:
                  last_status = f"Waiting for push workflow '{workflow_name}' for release commit {sha}."
                  print(last_status)

              if time.time() >= deadline:
                  raise SystemExit(f"Release blocked: {last_status}")

              time.sleep(15)
          PY

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Run release gate
        run: npm test

      - name: Pack distribution artifact
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          npm pack --json > pack-output.json
          PACKAGE_TARBALL=$(node -e "const output=require('./pack-output.json'); const value=Array.isArray(output) ? output[0]?.filename : output?.filename; if (!value) process.exit(1); process.stdout.write(value)")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "package_tarball=${PACKAGE_TARBALL}" >> "$GITHUB_OUTPUT"
          echo "package_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        env:
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
          PACKAGE_VERSION: ${{ steps.pack.outputs.package_version }}
        run: |
          test "$RELEASE_TAG_NAME" = "v$PACKAGE_VERSION" || {
            echo "release tag $RELEASE_TAG_NAME does not match v$PACKAGE_VERSION" >&2
            exit 1
          }

      - name: Docker Node 22 latest-client smoke verification
        shell: bash
        env:
          PACKAGE_TARBALL: ${{ steps.pack.outputs.package_tarball }}
        run: |
          set -euo pipefail
          docker run --rm \
            -e PACKAGE_TARBALL \
            -v "$PWD:/workspace" \
            -w /workspace \
            node:22-bookworm \
            bash -lc 'set -euo pipefail
              npm install -g \
                @lordierclaw/bluenote-webui@latest \
                @lordierclaw/bluenote-term@latest \
                "/workspace/${PACKAGE_TARBALL}"
              bluenote --help >/tmp/bluenote-help.txt
              bluenote version
              bluenote doctor
              bluenote daemon start
              bluenote doctor
              bluenote daemon stop
            '

  publish:
    name: Publish npm package
    needs: verify
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
